# Manual AMO release workflow.
#
# Triggered from the Actions tab ("Run workflow"). Generates a UTC
# timestamp version, writes it to public/manifest.json and package.json,
# builds, then signs/uploads the .xpi to the AMO listed channel.
#
# Prerequisites:
#   - The AMO listing for link-mage already exists (v1.0.0 was uploaded
#     manually through the AMO web UI to create the listing).
#   - Repository secrets AMO_API_KEY and AMO_API_SECRET are set
#     (https://addons.mozilla.org/developers/addon/api/key).
name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare release version
        run: bun run prepare-release

      - name: Read release version
        id: version
        run: |
          version=$(jq -r .version public/manifest.json)
          version_name=$(jq -r .version_name public/manifest.json)
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${version} (${version_name})"

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Lint extension
        run: bun run lint:ext

      - name: Package source zip for AMO review
        run: bun run package:source

      - name: Commit release version
        env:
          BRANCH: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/manifest.json package.json
          if git diff --cached --quiet; then
            echo "No release version changes to commit."
            exit 1
          fi
          git commit -m "Release v${VERSION}"
          git push origin "HEAD:${BRANCH}"

      - name: Sign and upload to AMO (listed channel)
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          bunx web-ext sign \
            --source-dir dist \
            --channel=listed \
            --api-key "${AMO_API_KEY}" \
            --api-secret "${AMO_API_SECRET}" \
            --upload-source-code "web-ext-artifacts/link-mage-source-${{ steps.version.outputs.value }}.zip" \
            --artifacts-dir web-ext-artifacts
