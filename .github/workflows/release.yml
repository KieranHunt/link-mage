# Manual release workflow.
#
# Triggered from the Actions tab ("Run workflow"). Reads the version
# from public/manifest.json, builds and signs/uploads the .xpi to the
# AMO listed channel, then tags the commit and creates a GitHub release
# with auto-generated notes.
#
# Prerequisites:
#   - The AMO listing for link-mage already exists (v1.0.0 was uploaded
#     manually through the AMO web UI to create the listing).
#   - Repository secrets AMO_API_KEY and AMO_API_SECRET are set
#     (https://addons.mozilla.org/developers/addon/api/key).
#   - public/manifest.json has been bumped to a NEW version number that
#     hasn't been uploaded before. AMO rejects re-uploads of an
#     existing version.
name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint extension
        run: bun run lint:ext

      - name: Build
        run: bun run build

      - name: Read version from manifest
        id: version
        run: |
          version=$(jq -r .version public/manifest.json)
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${version}"

      - name: Refuse to release if tag already exists
        run: |
          tag="v${{ steps.version.outputs.value }}"
          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists. Bump public/manifest.json to a new version before releasing."
            exit 1
          fi

      - name: Package source zip for AMO review
        run: bun run package:source

      - name: Sign and upload to AMO (listed channel)
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          bunx web-ext sign \
            --source-dir dist \
            --channel=listed \
            --api-key "${AMO_API_KEY}" \
            --api-secret "${AMO_API_SECRET}" \
            --upload-source-code "web-ext-artifacts/link-mage-source-${{ steps.version.outputs.value }}.zip" \
            --artifacts-dir web-ext-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            web-ext-artifacts/link-mage-source-${{ steps.version.outputs.value }}.zip
